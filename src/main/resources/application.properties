spring.application.name=hibernate-envers-101

# ===== Local PostgreSQL =====
# Prerequisite: createdb -U postgres envers_demo
spring.datasource.url=jdbc:postgresql://localhost:5432/envers_demo
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Hibernate Envers =====
# Suffix used for the audit (history) tables (default: _AUD)
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_AUD
# Name of the column holding the revision number (default: REV)
spring.jpa.properties.org.hibernate.envers.revision_field_name=REV
# Name of the column holding the operation type 0=ADD 1=MOD 2=DEL (default: REVTYPE)
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=REVTYPE
# On DELETE revisions, store the last known field values instead of NULLs:
# makes it possible to fully reconstruct the entity state at delete time.
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true
# Adds a *_MOD boolean column for each audited field, marking whether that
# specific field changed in a given revision: handy for "what changed?" queries.
spring.jpa.properties.org.hibernate.envers.global_with_modified_flag=true

server.port=8080

# ===== Demo runner =====
# If true, on startup runs the full demo scenario that populates customer/product
# and prints history, diff, snapshot, rollback. Set to false to disable.
demo.enabled=true
# If true, wipes the data tables and the _AUD tables before running the demo,
# making each startup idempotent.
demo.reset=true
